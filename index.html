<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goodman Computer - Invoice Generator</title>
  <!-- Tailwind CSS for Professional Styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              light: '#138d56',
              DEFAULT: '#0A5C36', // Deep Green
              dark: '#05331e',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap');

    body {
      font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
      background-color: #f3f4f6;
    }

    /* Clean inputs for print */
    input,
    textarea {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      outline: none;
      resize: none;
      transition: border 0.2s;
    }

    input:hover,
    textarea:hover,
    input:focus,
    textarea:focus {
      border-bottom: 1px dashed #0A5C36;
    }

    /* Specific numeric inputs alignment */
    .num-input {
      text-align: right;
    }

    /* Ensure the mobile view doesn't force right-alignment on inputs */
    @media (max-width: 768px) {
      .num-input.mobile-left {
        text-align: left;
      }
    }

    /* Print media overrides to ensure high-quality browser printing */
    @media print {
      body {
        background-color: #fff !important;
        padding: 15mm 10mm !important;
        margin: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Hide elements marked as non-printable */
      [data-html2pdf-ignore="true"],
      .no-print {
        display: none !important;
      }

      /* Hide input fields when replaced by text spans */
      .print-hidden-input {
        display: none !important;
      }

      /* Format the invoice canvas to span full width nicely on A4 paper */
      #invoice-canvas {
        max-width: 100% !important;
        width: 100% !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        border: none !important;
      }

      /* Force header components to stay in a row when printing */
      .invoice-header-row {
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: flex-start !important;
        gap: 0 !important;
      }
      .invoice-header-row > div {
        width: auto !important;
      }
      .invoice-header-row > div:last-child {
        text-align: right !important;
        background: transparent !important;
        padding: 0 !important;
      }
      .invoice-header-row > div:last-child * {
        text-align: right !important;
      }

      /* Force address blocks (From & Bill To) to stay in a row when printing */
      .invoice-addresses-row {
        flex-direction: row !important;
        justify-content: space-between !important;
        gap: 0 !important;
      }
      .invoice-addresses-row > div {
        width: 48% !important;
      }
      .invoice-addresses-row > div:last-child {
        text-align: right !important;
        border-left: 1px solid #e5e7eb !important;
        padding-left: 1rem !important;
      }
      .invoice-addresses-row > div:last-child * {
        text-align: right !important;
      }

      /* Force totals & notes blocks to stay in a row when printing */
      .invoice-totals-row {
        flex-direction: row !important;
        justify-content: space-between !important;
        gap: 0 !important;
      }
      .invoice-totals-row > div:first-child {
        width: 50% !important;
        padding-right: 1rem !important;
        order: 1 !important;
      }
      .invoice-totals-row > div:last-child {
        width: 40% !important;
        order: 2 !important;
      }

      /* Hide default date picker calendar icons when printing */
      input[type="date"]::-webkit-calendar-picker-indicator {
        display: none;
        -webkit-appearance: none;
      }

      /* Set margin to 0 to completely hide default browser headers and footers (page titles, URLs, etc.) */
      @page {
        size: A4;
        margin: 0;
      }
    }
  </style>
</head>

<body class="py-4 md:py-8 px-2 md:px-4 text-gray-800">

  <!-- Top Controls (Not included in PDF/Print) -->
  <div
    class="max-w-4xl mx-auto mb-6 flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-lg shadow-sm gap-4"
    data-html2pdf-ignore="true">
    <div class="flex items-center space-x-4 w-full sm:w-auto justify-between sm:justify-start">
      <div class="flex items-center space-x-4">
        <label class="font-semibold text-gray-600">Language:</label>
        <select id="langSwitch" onchange="changeLanguage()"
          class="border border-gray-300 rounded px-3 py-1 bg-white focus:outline-none focus:border-brand">
          <option value="en">English</option>
          <option value="bn">বাংলা (Bengali)</option>
        </select>
      </div>
    </div>
    <div class="w-full sm:w-auto">
      <button onclick="window.print()"
        class="w-full sm:w-auto justify-center bg-brand hover:bg-brand-dark text-white font-semibold py-2 px-6 rounded shadow-md transition duration-300 flex items-center">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
        <span data-i18n="printBtn">Print Invoice</span>
      </button>
    </div>
  </div>

  <!-- INVOICE CANVAS (This whole div gets exported) -->
  <div id="invoice-canvas" class="max-w-4xl mx-auto bg-white p-6 sm:p-10 md:p-16 shadow-xl rounded-sm">

    <!-- Header: Logo and Invoice Info -->
    <div
      class="invoice-header-row flex flex-col md:flex-row justify-between items-start border-b-2 border-brand pb-6 md:pb-8 mb-6 md:mb-8 gap-6 md:gap-0">
      <!-- Brand Info & Logo -->
      <div class="flex items-center space-x-4 w-full md:w-auto justify-center md:justify-start">
        <img src="goodman_logo.png" alt="Goodman Logo" class="object-contain max-w-[200px] md:max-w-[300px] h-auto" />
      </div>

      <!-- Invoice Meta data -->
      <div
        class="text-left md:text-right w-full md:w-auto bg-gray-50 md:bg-transparent p-4 md:p-0 rounded-lg md:rounded-none">
        <h2 class="text-3xl md:text-4xl font-bold text-gray-300 md:text-gray-200 uppercase tracking-wider mb-2 md:mb-4"
          data-i18n="title">INVOICE</h2>
        <div class="grid grid-cols-2 gap-y-2 gap-x-4 text-sm items-center">
          <div class="font-semibold text-gray-600" data-i18n="invoiceNo">Invoice No:</div>
          <div><input type="text" id="auto-invoice-no" class="num-input mobile-left font-bold w-full" value=""></div>

          <div class="font-semibold text-gray-600" data-i18n="date">Date:</div>
          <div><input type="date" id="auto-date" class="num-input mobile-left text-gray-800 w-full" value=""></div>
        </div>
      </div>
    </div>

    <!-- Addresses -->
    <div class="invoice-addresses-row flex flex-col md:flex-row justify-between mb-8 md:mb-10 gap-8 md:gap-0">
      <div class="w-full md:w-1/2 md:pr-4">
        <h3 class="font-bold text-brand mb-2 border-b border-gray-200 inline-block pb-1" data-i18n="from">From</h3>
        <p class="font-bold text-gray-800">Goodman Computer</p>
        <textarea class="text-sm text-gray-600 mt-1 h-20 w-full"
          placeholder="Your Address">BCS Computer City&#10;IDB Bhaban, Agargaon&#10;Dhaka, Bangladesh&#10;Phone: +880 1XXX-XXXXXX</textarea>
      </div>
      <div class="w-full md:w-1/2 md:pl-4 md:border-l border-gray-200 text-left md:text-right">
        <h3 class="font-bold text-brand mb-2 border-b border-gray-200 inline-block pb-1" data-i18n="billTo">Bill To</h3>
        <input type="text" class="font-bold text-gray-800 text-left md:text-right w-full block mb-1"
          placeholder="Client/Company Name" value="Tech Solutions Ltd.">
        <textarea class="text-sm text-gray-600 h-20 text-left md:text-right w-full"
          placeholder="Client Address">123 Business Avenue&#10;Block C, Banani&#10;Dhaka, Bangladesh</textarea>
      </div>
    </div>

    <!-- Items Table (Responsive Wrapper Added) -->
    <div class="mb-8 overflow-hidden rounded-lg border border-gray-200">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[600px]">
          <thead>
            <tr class="bg-brand text-white text-sm uppercase tracking-wider">
              <th class="py-3 px-4 w-1/2" data-i18n="description">Item Description</th>
              <th class="py-3 px-4 text-center" data-i18n="qty">Qty</th>
              <th class="py-3 px-4 text-right" data-i18n="price">Price</th>
              <th class="py-3 px-4 text-right" data-i18n="amount">Amount</th>
              <th class="py-3 px-2 w-10 text-center" data-html2pdf-ignore="true"></th>
            </tr>
          </thead>
          <tbody id="invoice-items" class="text-sm divide-y divide-gray-200">
            <!-- Default Row 1 -->
            <tr class="hover:bg-gray-50">
              <td class="py-2 px-4"><input type="text" placeholder="Product Name/Model"
                  value="Desktop PC Core i5 12th Gen"></td>
              <td class="py-2 px-4"><input type="number" class="num-input qty-input" value="1" oninput="calculate()">
              </td>
              <td class="py-2 px-4"><input type="number" class="num-input price-input" value="45000"
                  oninput="calculate()"></td>
              <td class="py-2 px-4 text-right font-semibold text-gray-700 amount-display">45000</td>
              <td class="py-2 px-2 text-center" data-html2pdf-ignore="true">
                <button onclick="removeRow(this)"
                  class="text-red-400 hover:text-red-600 font-bold text-lg leading-none">&times;</button>
              </td>
            </tr>
            <!-- Default Row 2 -->
            <tr class="hover:bg-gray-50">
              <td class="py-2 px-4"><input type="text" placeholder="Product Name/Model" value="Logitech Wireless Mouse">
              </td>
              <td class="py-2 px-4"><input type="number" class="num-input qty-input" value="2" oninput="calculate()">
              </td>
              <td class="py-2 px-4"><input type="number" class="num-input price-input" value="1200"
                  oninput="calculate()">
              </td>
              <td class="py-2 px-4 text-right font-semibold text-gray-700 amount-display">2400</td>
              <td class="py-2 px-2 text-center" data-html2pdf-ignore="true">
                <button onclick="removeRow(this)"
                  class="text-red-400 hover:text-red-600 font-bold text-lg leading-none">&times;</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="p-3 bg-gray-50 border-t border-gray-200 text-center" data-html2pdf-ignore="true">
        <button onclick="addRow()" class="text-sm font-semibold text-brand hover:text-brand-dark">+ <span
            data-i18n="addRow">Add New Item</span></button>
      </div>
    </div>

    <!-- Totals & Notes -->
    <div class="invoice-totals-row flex flex-col md:flex-row justify-between mt-8 gap-8 md:gap-4">
      <!-- Notes -->
      <div class="w-full md:w-1/2 md:pr-4 order-2 md:order-1">
        <div class="mb-6">
          <h4 class="font-bold text-gray-700 text-sm mb-1 uppercase" data-i18n="paymentMethods">Payment Methods</h4>
          <textarea class="text-sm text-gray-600 h-16 w-full"
            placeholder="Bank details or bKash...">Bank Transfer: Brac Bank&#10;A/C: 123456789012&#10;bKash: +880 1XXX-XXXXXX</textarea>
        </div>
        <div>
          <h4 class="font-bold text-gray-700 text-sm mb-1 uppercase" data-i18n="terms">Terms & Conditions</h4>
          <textarea class="text-sm text-gray-600 h-16 w-full"
            placeholder="Warranty details...">Products carry brand warranty as per manufacturer policy. Goods once sold cannot be returned.</textarea>
        </div>
      </div>

      <!-- Calculations -->
      <div class="w-full md:w-5/12 order-1 md:order-2">
        <div class="bg-gray-50 rounded-lg p-5 border border-gray-100 shadow-sm">
          <div class="flex justify-between items-center mb-2">
            <span class="text-gray-600 font-medium" data-i18n="subtotal">Subtotal</span>
            <span class="font-semibold text-gray-800" id="subtotal">47400</span>
          </div>
          <div class="flex justify-between items-center mb-2 border-b border-gray-200 pb-3 mt-3">
            <span class="text-gray-600 font-medium" data-i18n="discount">Discount (-)</span>
            <input type="number" id="discount"
              class="num-input w-24 border-b border-gray-300 focus:border-brand bg-white px-1 py-1 rounded-sm"
              value="400" oninput="calculate()">
          </div>
          <div class="flex justify-between items-center mt-4">
            <span class="text-lg font-bold text-brand uppercase" data-i18n="grandTotal">Grand Total</span>
            <span class="text-xl font-bold text-brand"><span id="currency">৳</span> <span
                id="grandTotal">47000</span></span>
          </div>
        </div>

        <!-- Signature Area -->
        <div class="mt-12 md:mt-16 text-right">
          <div class="w-48 ml-auto border-t-2 border-gray-400 pt-2">
            <span class="font-medium text-gray-600 text-sm" data-i18n="signature">Authorized Signature</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Initialize Auto-Data and Calculations on load
      window.onload = function () {
        generateAutoData();
        calculate();
      };

      // Auto-generate Date and Invoice Number
      function generateAutoData() {
        const now = new Date();

        // 1. Format date as YYYY-MM-DD
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const formattedDate = `${year}-${month}-${day}`;

        // 2. Generate Invoice Number: GC-YYYYMMDD-XXXX (random)
        const randomId = Math.floor(1000 + Math.random() * 9000);
        const invoiceNo = `#GC-${year}${month}${day}-${randomId}`;

        // 3. Inject into the DOM
        document.getElementById('auto-date').value = formattedDate;
        document.getElementById('auto-invoice-no').value = invoiceNo;
      }
    // Dictionary for Bilingual Support
    const dict = {
      en: {
        printBtn: "Print Invoice", title: "INVOICE", invoiceNo: "Invoice No:", date: "Date:",
        from: "From", billTo: "Bill To", description: "Item Description", qty: "Qty",
        price: "Price", amount: "Amount", addRow: "Add New Item", paymentMethods: "Payment Methods",
        terms: "Terms & Conditions", subtotal: "Subtotal", discount: "Discount (-)",
        grandTotal: "Grand Total", signature: "Authorized Signature", currencySymbol: "৳"
      },
      bn: {
        printBtn: "মুদ্রণ করুন", title: "চালান", invoiceNo: "চালান নম্বর:", date: "তারিখ:",
        from: "প্রেরক", billTo: "প্রাপক", description: "পণ্যের বিবরণ", qty: "পরিমাণ",
        price: "মূল্য", amount: "মোট মূল্য", addRow: "নতুন পণ্য যোগ করুন", paymentMethods: "পেমেন্ট মাধ্যম",
        terms: "শর্তাবলী", subtotal: "উপমোট", discount: "ছাড় (-)",
        grandTotal: "সর্বমোট", signature: "অনুমোদিত স্বাক্ষর", currencySymbol: "৳"
      }
    };

    // Initialize calculations on load
    

    // Language Switcher Function
    function changeLanguage() {
      const lang = document.getElementById('langSwitch').value;
      const elements = document.querySelectorAll('[data-i18n]');

      elements.forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[lang][key]) {
          el.innerText = dict[lang][key];
        }
      });
      document.getElementById('currency').innerText = dict[lang].currencySymbol;
    }

    // Calculation Function
    function calculate() {
      const rows = document.querySelectorAll('#invoice-items tr');
      let subtotal = 0;

      rows.forEach(row => {
        const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
        const price = parseFloat(row.querySelector('.price-input').value) || 0;
        const amount = qty * price;

        row.querySelector('.amount-display').innerText = amount.toLocaleString('en-IN');
        subtotal += amount;
      });

      document.getElementById('subtotal').innerText = subtotal.toLocaleString('en-IN');

      const discount = parseFloat(document.getElementById('discount').value) || 0;
      const grandTotal = subtotal - discount;

      document.getElementById('grandTotal').innerText = grandTotal.toLocaleString('en-IN');
    }

    // Add Row Function
    function addRow() {
      const tbody = document.getElementById('invoice-items');
      const tr = document.createElement('tr');
      tr.className = "hover:bg-gray-50";
      tr.innerHTML = `
                <td class="py-2 px-4"><input type="text" placeholder="Product Name/Model"></td>
                <td class="py-2 px-4"><input type="number" class="num-input qty-input" value="1" oninput="calculate()"></td>
                <td class="py-2 px-4"><input type="number" class="num-input price-input" value="0" oninput="calculate()"></td>
                <td class="py-2 px-4 text-right font-semibold text-gray-700 amount-display">0</td>
                <td class="py-2 px-2 text-center" data-html2pdf-ignore="true">
                    <button onclick="removeRow(this)" class="text-red-400 hover:text-red-600 font-bold text-lg leading-none">&times;</button>
                </td>
            `;
      tbody.appendChild(tr);
      calculate();
    }

    // Remove Row Function
    function removeRow(btn) {
      const row = btn.closest('tr');
      row.remove();
      calculate();
    }

    // Before/After print events to dynamically convert input fields to static text spans
    window.addEventListener('beforeprint', () => {
      const inputs = document.querySelectorAll('#invoice-canvas input, #invoice-canvas textarea');
      inputs.forEach(input => {
        const span = document.createElement('span');
        span.className = 'print-temp-text';
        
        // Copy value or empty space (avoiding placeholder rendering in print)
        if (input.tagName === 'TEXTAREA') {
          span.style.whiteSpace = 'pre-wrap';
          span.style.display = 'block';
          span.textContent = input.value || '';
        } else {
          span.textContent = input.value || '';
        }
        
        // Match style and alignment
        const computedStyle = window.getComputedStyle(input);
        if (computedStyle.textAlign === 'right' || input.classList.contains('num-input')) {
          span.style.display = 'block';
          span.style.textAlign = 'right';
        } else {
          span.style.display = 'inline-block';
        }
        
        span.style.fontFamily = computedStyle.fontFamily;
        span.style.fontSize = computedStyle.fontSize;
        span.style.fontWeight = computedStyle.fontWeight;
        span.style.color = computedStyle.color;
        span.style.width = '100%';
        
        // Hide input and insert span
        input.classList.add('print-hidden-input');
        input.parentNode.insertBefore(span, input);
      });
    });

    window.addEventListener('afterprint', () => {
      document.querySelectorAll('.print-temp-text').forEach(el => el.remove());
      document.querySelectorAll('.print-hidden-input').forEach(input => {
        input.classList.remove('print-hidden-input');
      });
    });
  </script>
</body>

</html>
